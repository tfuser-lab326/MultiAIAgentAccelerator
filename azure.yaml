# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    azd: '>= 1.24.0'
    extensions:
        azure.ai.agents: '>= 0.1.27-preview'
name: prior-auth-maf
metadata:
    template: prior-auth-maf@1.0
services:
    clinical-reviewer-agent:
        project: ./agents/clinical
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "1"
                    memory: 2Gi
            startupCommand: python main.py
    compliance-agent:
        project: ./agents/compliance
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            startupCommand: python main.py
    coverage-assessment-agent:
        project: ./agents/coverage
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "1"
                    memory: 2Gi
            startupCommand: python main.py
    synthesis-agent:
        project: ./agents/synthesis
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "1"
                    memory: 2Gi
            startupCommand: python main.py
hooks:
    postdeploy:
        windows:
            shell: pwsh
            run: |
                # Resolve Python interpreter — prefer `python`, fall back to `py -3`
                # for python.org installer machines that only register the launcher.
                $py = if (Get-Command python -ErrorAction SilentlyContinue) { 'python' }
                      elseif (Get-Command py -ErrorAction SilentlyContinue)  { 'py -3' }
                      else { Write-Host '  ERROR: Python 3 not found on PATH. Install from https://www.python.org/downloads/' -ForegroundColor Red; exit 1 }

                Write-Host ""
                Write-Host "  Granting Azure AI User to hosted agent instance identities..." -ForegroundColor Yellow
                Invoke-Expression "$py scripts/grant_agent_rbac.py"
                if ($LASTEXITCODE -ne 0) {
                    Write-Host "  WARNING: agent RBAC grant did not complete cleanly — review output above" -ForegroundColor Yellow
                } else {
                    Write-Host "  Agent RBAC up to date" -ForegroundColor Green
                }

                # ── Post-deploy health check (agents now exist with versions) ──
                Write-Host ""
                Write-Host "  Running post-deploy health check..." -ForegroundColor Yellow
                $healthCheck = Invoke-Expression "$py scripts/check_agents.py 2>&1"
                $healthCheck | ForEach-Object { Write-Host $_ }
                if ($LASTEXITCODE -eq 0) {
                    Write-Host "  Health check passed" -ForegroundColor Green
                } else {
                    Write-Host "  WARNING: Some health checks did not pass — review output above" -ForegroundColor Yellow
                }

                Write-Host ""
                Write-Host "===============================================================" -ForegroundColor Yellow
                Write-Host " DEPLOYMENT COMPLETE" -ForegroundColor Green
                Write-Host "===============================================================" -ForegroundColor Yellow
                Write-Host ""
                $frontendUrl = azd env get-value frontendUrl
                $backendUrl  = azd env get-value backendUrl
                # ANSI: cyan + underline for highlighted, clickable URLs in modern terminals
                $esc = [char]27
                $u   = "$esc[4;36m"   # underline + cyan
                $r   = "$esc[0m"      # reset
                Write-Host "Frontend URL:" -ForegroundColor Yellow
                Write-Host "  $u`https://$frontendUrl/$r"
                Write-Host ""
                Write-Host "Backend URL:" -ForegroundColor Yellow
                Write-Host "  $u`https://$backendUrl/$r"
                Write-Host ""
                Write-Host "Backend Health:" -ForegroundColor Yellow
                Write-Host "  $u`https://$backendUrl/health$r"
                Write-Host ""
                Write-Host "Try it now:" -ForegroundColor Green
                Write-Host "  1. Open the Frontend URL above in your browser"
                Write-Host "  2. Click 'Load Sample Case' to populate the form"
                Write-Host "  3. Click 'Submit for Review' to start the multi-agent review"
                Write-Host ""
            continueOnError: true
            interactive: true
        posix:
            name: postdeploy
            kind: sh
            shell: sh
            run: |
                # Resolve Python interpreter — macOS ships only `python3`, Linux
                # usually has both. Prefer `python3` then fall back to `python`.
                PY=$(command -v python3 2>/dev/null || command -v python 2>/dev/null)
                if [ -z "$PY" ]; then
                    printf "\033[0;31m  ERROR: Python 3 not found on PATH. Install via 'brew install python' (macOS) or your package manager.\033[0m\n"
                    exit 1
                fi

                Yellow='\033[1;33m'
                Green='\033[0;32m'
                Blue='\033[0;34m'
                NC='\033[0m'
                printf "\n${Yellow}  Granting Azure AI User to hosted agent instance identities...${NC}\n"
                if "$PY" scripts/grant_agent_rbac.py; then
                    printf "${Green}  Agent RBAC up to date${NC}\n"
                else
                    printf "${Yellow}  WARNING: agent RBAC grant did not complete cleanly — review output above${NC}\n"
                fi

                # Post-deploy health check (agents now exist with versions)
                printf "\n${Yellow}  Running post-deploy health check...${NC}\n"
                if "$PY" scripts/check_agents.py 2>&1; then
                    printf "${Green}  Health check passed${NC}\n"
                else
                    printf "${Yellow}  WARNING: Some health checks did not pass — review output above${NC}\n"
                fi

                printf "\n"
                printf "${Yellow}===============================================================\n"
                printf "${Green} DEPLOYMENT COMPLETE\n"
                printf "${Yellow}===============================================================${NC}\n\n"
                FRONTEND_URL=$(azd env get-value frontendUrl)
                BACKEND_URL=$(azd env get-value backendUrl)
                # ANSI: underline + cyan for highlighted, clickable URLs
                URL='\033[4;36m'
                printf "${Yellow}Frontend URL:${NC}\n"
                printf "  ${URL}https://%s/${NC}\n\n" "$FRONTEND_URL"
                printf "${Yellow}Backend URL:${NC}\n"
                printf "  ${URL}https://%s/${NC}\n\n" "$BACKEND_URL"
                printf "${Yellow}Backend Health:${NC}\n"
                printf "  ${URL}https://%s/health${NC}\n\n" "$BACKEND_URL"
                printf "${Green}Try it now:${NC}\n"
                printf "  1. Open the Frontend URL above in your browser\n"
                printf "  2. Click 'Load Sample Case' to populate the form\n"
                printf "  3. Click 'Submit for Review' to start the multi-agent review\n\n"
            continueOnError: true
            interactive: true
    postprovision:
        windows:
            shell: pwsh
            run: |
                Write-Host ""
                Write-Host "===============================================================" -ForegroundColor Yellow
                Write-Host " BUILDING CONTAINER IMAGES (remote ACR build)" -ForegroundColor Green
                Write-Host "===============================================================" -ForegroundColor Yellow

                $acrEndpoint      = azd env get-value AZURE_CONTAINER_REGISTRY_ENDPOINT
                $acrName          = $acrEndpoint -replace '\.azurecr\.io$', ''
                $rgName           = azd env get-value AZURE_RESOURCE_GROUP
                $backendApp       = azd env get-value BACKEND_CONTAINER_APP_NAME
                $frontendApp      = azd env get-value FRONTEND_CONTAINER_APP_NAME
                $foundryAccountName = azd env get-value AI_FOUNDRY_ACCOUNT_NAME
                $foundryProjectName = azd env get-value AI_FOUNDRY_PROJECT_NAME
                $projectEndpoint    = azd env get-value AI_FOUNDRY_PROJECT_ENDPOINT

                # Persist AZURE_TENANT_ID so the `azd ai agent` extension's own
                # postdeploy hook (Foundry playground link generation) can resolve
                # the tenant without prompting. Bicep can't output this reliably
                # at every scope, so we read it from `az account show` once.
                $tenantId = az account show --query tenantId -o tsv 2>$null
                if ($tenantId) { azd env set AZURE_TENANT_ID $tenantId | Out-Null }

                # Use a unique tag per build so ACA always pulls the fresh image
                $imageTag = Get-Date -Format 'yyyyMMddHHmmss'
                Write-Host "  Image tag: $imageTag" -ForegroundColor Gray

                Write-Host ""
                Write-Host "  Building backend on ACR ($acrName)..." -ForegroundColor White
                $ErrorActionPreference = 'SilentlyContinue'
                az acr build --registry $acrName --image "backend:$imageTag" --platform linux/amd64 ./backend --no-logs 2>&1 | Out-Null
                $backendExit = $LASTEXITCODE
                $ErrorActionPreference = 'Continue'
                if ($backendExit -ne 0) { Write-Host "  ERROR: Backend build failed!" -ForegroundColor Red; exit 1 }
                Write-Host "  Backend image built successfully" -ForegroundColor Green

                Write-Host "  Building frontend on ACR ($acrName)..." -ForegroundColor White
                $ErrorActionPreference = 'SilentlyContinue'
                az acr build --registry $acrName --image "frontend:$imageTag" --platform linux/amd64 ./frontend --no-logs 2>&1 | Out-Null
                $frontendExit = $LASTEXITCODE
                $ErrorActionPreference = 'Continue'
                if ($frontendExit -ne 0) { Write-Host "  ERROR: Frontend build failed!" -ForegroundColor Red; exit 1 }
                Write-Host "  Frontend image built successfully" -ForegroundColor Green

                # NOTE: agent-clinical / agent-coverage / agent-compliance / agent-synthesis
                # images are built and pushed by `azd deploy` itself via the
                # `services:` block at the top of this file (host: azure.ai.agent,
                # docker.remoteBuild: true). Do NOT add `az acr build` lines for them
                # here — duplicated builds + duplicated `create_version` calls were
                # the source of the prior 424 session_not_ready churn.

                Write-Host ""
                Write-Host "  Updating container apps with new images..." -ForegroundColor White
                # See bash branch for rationale. --registry-server / --registry-identity
                # are NOT valid on `containerapp update` — they only exist on
                # `containerapp registry set`, so we attach the registry first then
                # swap the image.
                foreach ($app in @($backendApp, $frontendApp)) {
                    az containerapp registry set --name $app --resource-group $rgName `
                        --server $acrEndpoint --identity system --output none
                    if ($LASTEXITCODE -ne 0) { Write-Host "  ERROR: failed to attach ACR registry to $app" -ForegroundColor Red; exit 1 }
                }
                Write-Host "    backend  -> $acrEndpoint/backend:$imageTag" -ForegroundColor White
                az containerapp update --name $backendApp --resource-group $rgName `
                    --image "$acrEndpoint/backend:$imageTag" --output none
                if ($LASTEXITCODE -ne 0) { Write-Host "  ERROR: backend container app update failed" -ForegroundColor Red; exit 1 }
                Write-Host "    frontend -> $acrEndpoint/frontend:$imageTag" -ForegroundColor White
                az containerapp update --name $frontendApp --resource-group $rgName `
                    --image "$acrEndpoint/frontend:$imageTag" --output none
                if ($LASTEXITCODE -ne 0) { Write-Host "  ERROR: frontend container app update failed" -ForegroundColor Red; exit 1 }
                Write-Host "  Backend and frontend container apps updated" -ForegroundColor Green

                Write-Host ""
                Write-Host "  Granting deployer + backend RBAC on Foundry..." -ForegroundColor Yellow
                $deployerOid = az ad signed-in-user show --query id -o tsv 2>$null
                $subId = azd env get-value AZURE_SUBSCRIPTION_ID 2>$null
                $accountScope = "/subscriptions/$subId/resourceGroups/$rgName/providers/Microsoft.CognitiveServices/accounts/$foundryAccountName"
                $projectScope = "$accountScope/projects/$foundryProjectName"

                if ($deployerOid) {
                    $existing = az role assignment list --assignee $deployerOid --role "Azure AI User" --scope $projectScope --query "[].id" -o tsv 2>$null
                    az role assignment create --assignee $deployerOid --role "Azure AI User" --scope $accountScope --only-show-errors 2>$null | Out-Null
                    az role assignment create --assignee $deployerOid --role "Azure AI User" --scope $projectScope --only-show-errors 2>$null | Out-Null
                    $roleIsNew = -not $existing
                    Write-Host "    deployer: Azure AI User" -ForegroundColor Gray

                    # Azure AI Project Manager (deployer, project scope) is required by the
                    # refreshed Hosted Agents preview to call create_version() on
                    # HostedAgentDefinition / PromptAgentDefinition. Azure AI User only covers
                    # invoking an existing agent; agent deployment writes need Project Manager.
                    # https://learn.microsoft.com/azure/foundry/agents/how-to/deploy-hosted-agent#required-permissions
                    $existingPM = az role assignment list --assignee $deployerOid --role "Azure AI Project Manager" --scope $projectScope --query "[].id" -o tsv 2>$null
                    az role assignment create --assignee $deployerOid --role "Azure AI Project Manager" --scope $projectScope --only-show-errors 2>$null | Out-Null
                    if (-not $existingPM) { $roleIsNew = $true }
                    Write-Host "    deployer: Azure AI Project Manager" -ForegroundColor Gray
                } else {
                    Write-Host "    WARN: Could not determine deployer OID — skipping deployer RBAC" -ForegroundColor Yellow
                    $roleIsNew = $false
                }

                # Also assign Azure AI User to the Backend ACA managed identity so it can
                # call Foundry Hosted Agents at runtime via DefaultAzureCredential.
                $backendMiOid = az containerapp identity show --name $backendApp --resource-group $rgName --query "principalId" -o tsv 2>$null
                if ($backendMiOid) {
                    az role assignment create --assignee-object-id $backendMiOid --assignee-principal-type ServicePrincipal --role "Azure AI User" --scope $accountScope --only-show-errors 2>$null | Out-Null
                    az role assignment create --assignee-object-id $backendMiOid --assignee-principal-type ServicePrincipal --role "Azure AI User" --scope $projectScope --only-show-errors 2>$null | Out-Null
                    Write-Host "    backend MI: Azure AI User" -ForegroundColor Gray
                } else {
                    Write-Host "    WARN: Could not retrieve backend managed identity" -ForegroundColor Yellow
                }
                Write-Host "  RBAC ensured" -ForegroundColor Green

                if ($roleIsNew) {
                    Write-Host ""
                    Write-Host "  NOTE: New role assignments take ~30-60s to propagate. If 'azd deploy'" -ForegroundColor Yellow
                    Write-Host "        fails on the first attempt with a 403, wait one minute and re-run." -ForegroundColor Yellow
                }

                # Mark images as built so subsequent provisions use ACR images directly
                azd env set IMAGES_BUILT true | Out-Null

                Write-Host ""
                Write-Host "  Provisioning complete. Continuing to agent deployment..." -ForegroundColor Green
                Write-Host ""
            interactive: true
        posix:
            name: postprovision
            kind: sh
            shell: sh
            run: |
                Green='\033[0;32m'
                Yellow='\033[1;33m'
                Blue='\033[0;34m'
                Red='\033[0;31m'
                White='\033[1;37m'
                NC='\033[0m'

                printf "\n"
                printf "${Yellow}===============================================================\n"
                printf "${Green} BUILDING CONTAINER IMAGES (remote ACR build)\n"
                printf "${Yellow}===============================================================${NC}\n"

                ACR_ENDPOINT=$(azd env get-value AZURE_CONTAINER_REGISTRY_ENDPOINT)
                ACR_NAME=$(echo "$ACR_ENDPOINT" | sed 's/\.azurecr\.io$//')
                RG_NAME=$(azd env get-value AZURE_RESOURCE_GROUP)
                BACKEND_APP=$(azd env get-value BACKEND_CONTAINER_APP_NAME)
                FRONTEND_APP=$(azd env get-value FRONTEND_CONTAINER_APP_NAME)
                FOUNDRY_ACCOUNT_NAME=$(azd env get-value AI_FOUNDRY_ACCOUNT_NAME)
                FOUNDRY_PROJECT_NAME=$(azd env get-value AI_FOUNDRY_PROJECT_NAME)
                PROJECT_ENDPOINT=$(azd env get-value AI_FOUNDRY_PROJECT_ENDPOINT)

                # Persist AZURE_TENANT_ID so the `azd ai agent` extension's own
                # postdeploy hook (Foundry playground link generation) can resolve
                # the tenant without prompting. Bicep can't output this reliably
                # at every scope, so we read it from `az account show` once.
                TENANT_ID=$(az account show --query tenantId -o tsv 2>/dev/null) || TENANT_ID=""
                [ -n "$TENANT_ID" ] && azd env set AZURE_TENANT_ID "$TENANT_ID" >/dev/null

                # Use a unique tag per build so ACA always pulls the fresh image
                IMAGE_TAG=$(date -u +%Y%m%d%H%M%S)
                printf "  ${White}Image tag: %s${NC}\n" "$IMAGE_TAG"

                printf "\n${White}  Building backend on ACR (%s)...${NC}\n" "$ACR_NAME"
                az acr build --registry "$ACR_NAME" --image "backend:$IMAGE_TAG" --platform linux/amd64 ./backend --no-logs
                if [ $? -ne 0 ]; then printf "${Red}  ERROR: Backend build failed!${NC}\n"; exit 1; fi
                printf "${Green}  Backend image built successfully${NC}\n"

                printf "${White}  Building frontend on ACR (%s)...${NC}\n" "$ACR_NAME"
                az acr build --registry "$ACR_NAME" --image "frontend:$IMAGE_TAG" --platform linux/amd64 ./frontend --no-logs
                if [ $? -ne 0 ]; then printf "${Red}  ERROR: Frontend build failed!${NC}\n"; exit 1; fi
                printf "${Green}  Frontend image built successfully${NC}\n"

                # NOTE: agent-clinical / agent-coverage / agent-compliance / agent-synthesis
                # images are built and pushed by `azd deploy` itself via the
                # `services:` block at the top of this file (host: azure.ai.agent,
                # docker.remoteBuild: true). Do NOT add `az acr build` lines for them
                # here — duplicated builds + duplicated `create_version` calls were
                # the source of the prior 424 session_not_ready churn.

                printf "\n${White}  Updating container apps with new images...${NC}\n"
                # Configure ACR registry + system-assigned MI auth FIRST (idempotent),
                # then swap the image. On a clean first deploy, the Bicep `registries:`
                # array is empty (intentional — see infra/modules/container-app.bicep)
                # so the apps were created with NO ACR auth. `containerapp registry set`
                # attaches the registry config; subsequent runs are no-ops.
                # NOTE: --registry-server / --registry-identity are NOT valid flags on
                # `containerapp update` — they only exist on `containerapp registry set`.
                ACR_LOGIN="$ACR_ENDPOINT"
                for app in "$BACKEND_APP" "$FRONTEND_APP"; do
                    if ! az containerapp registry set --name "$app" --resource-group "$RG_NAME" \
                        --server "$ACR_LOGIN" --identity system --output none; then
                        printf "${Red}  ERROR: failed to attach ACR registry to %s${NC}\n" "$app"
                        exit 1
                    fi
                done
                printf "${White}    backend  → %s/backend:%s${NC}\n" "$ACR_LOGIN" "$IMAGE_TAG"
                if ! az containerapp update --name "$BACKEND_APP" --resource-group "$RG_NAME" \
                    --image "$ACR_LOGIN/backend:$IMAGE_TAG" --output none; then
                    printf "${Red}  ERROR: backend container app update failed${NC}\n"
                    exit 1
                fi
                printf "${White}    frontend → %s/frontend:%s${NC}\n" "$ACR_LOGIN" "$IMAGE_TAG"
                if ! az containerapp update --name "$FRONTEND_APP" --resource-group "$RG_NAME" \
                    --image "$ACR_LOGIN/frontend:$IMAGE_TAG" --output none; then
                    printf "${Red}  ERROR: frontend container app update failed${NC}\n"
                    exit 1
                fi
                printf "${Green}  Backend and frontend container apps updated${NC}\n"

                # ── FIX: guard all az ad / role assignment calls with || VAR="" so a
                # non-zero exit from `az ad signed-in-user show` (e.g. when running
                # under WSL / Git Bash where the shell treats the $() exit code as the
                # script exit code) does NOT abort the hook and block agent deployment.
                printf "\n${Yellow}  Granting deployer + backend RBAC on Foundry...${NC}\n"
                DEPLOYER_OID=$(az ad signed-in-user show --query id -o tsv 2>/dev/null) || DEPLOYER_OID=""
                SUB_ID=$(azd env get-value AZURE_SUBSCRIPTION_ID 2>/dev/null) || SUB_ID=""
                ACCOUNT_SCOPE="/subscriptions/$SUB_ID/resourceGroups/$RG_NAME/providers/Microsoft.CognitiveServices/accounts/$FOUNDRY_ACCOUNT_NAME"
                PROJECT_SCOPE="$ACCOUNT_SCOPE/projects/$FOUNDRY_PROJECT_NAME"

                ROLE_IS_NEW=false
                if [ -n "$DEPLOYER_OID" ]; then
                    EXISTING=$(az role assignment list --assignee "$DEPLOYER_OID" --role "Azure AI User" --scope "$PROJECT_SCOPE" --query "[].id" -o tsv 2>/dev/null) || EXISTING=""
                    az role assignment create --assignee "$DEPLOYER_OID" --role "Azure AI User" --scope "$ACCOUNT_SCOPE" --only-show-errors > /dev/null 2>&1 || true
                    az role assignment create --assignee "$DEPLOYER_OID" --role "Azure AI User" --scope "$PROJECT_SCOPE" --only-show-errors > /dev/null 2>&1 || true
                    [ -z "$EXISTING" ] && ROLE_IS_NEW=true
                    printf "    deployer: Azure AI User\n"

                    # Azure AI Project Manager (deployer, project scope) is required by the
                    # refreshed Hosted Agents preview to call create_version() on
                    # HostedAgentDefinition / PromptAgentDefinition. Azure AI User only covers
                    # invoking an existing agent; agent deployment writes need Project Manager.
                    # https://learn.microsoft.com/azure/foundry/agents/how-to/deploy-hosted-agent#required-permissions
                    EXISTING_PM=$(az role assignment list --assignee "$DEPLOYER_OID" --role "Azure AI Project Manager" --scope "$PROJECT_SCOPE" --query "[].id" -o tsv 2>/dev/null) || EXISTING_PM=""
                    az role assignment create --assignee "$DEPLOYER_OID" --role "Azure AI Project Manager" --scope "$PROJECT_SCOPE" --only-show-errors > /dev/null 2>&1 || true
                    [ -z "$EXISTING_PM" ] && ROLE_IS_NEW=true
                    printf "    deployer: Azure AI Project Manager\n"
                else
                    printf "${Yellow}    WARN: Could not determine deployer OID — skipping deployer RBAC${NC}\n"
                fi

                # Also assign Azure AI User to the Backend ACA managed identity so it can
                # call Foundry Hosted Agents at runtime via DefaultAzureCredential.
                BACKEND_MI_OID=$(az containerapp identity show --name "$BACKEND_APP" --resource-group "$RG_NAME" --query "principalId" -o tsv 2>/dev/null) || BACKEND_MI_OID=""
                if [ -n "$BACKEND_MI_OID" ]; then
                    az role assignment create --assignee-object-id "$BACKEND_MI_OID" --assignee-principal-type ServicePrincipal --role "Azure AI User" --scope "$ACCOUNT_SCOPE" --only-show-errors > /dev/null 2>&1 || true
                    az role assignment create --assignee-object-id "$BACKEND_MI_OID" --assignee-principal-type ServicePrincipal --role "Azure AI User" --scope "$PROJECT_SCOPE" --only-show-errors > /dev/null 2>&1 || true
                    printf "    backend MI: Azure AI User\n"
                else
                    printf "${Yellow}    WARN: Could not retrieve backend managed identity${NC}\n"
                fi
                printf "${Green}  RBAC ensured${NC}\n"

                if $ROLE_IS_NEW; then
                    printf "\n${Yellow}  NOTE: New role assignments take ~30-60s to propagate. If 'azd deploy'${NC}\n"
                    printf "${Yellow}        fails on the first attempt with a 403, wait one minute and re-run.${NC}\n"
                fi

                azd env set IMAGES_BUILT true || true

                printf "\n${Green}  Provisioning complete. Continuing to agent deployment...${NC}\n\n"
    preprovision:
        windows:
            shell: pwsh
            run: "# ── Region Validation ────────────────────────────────────────\n$region = azd env get-value AZURE_LOCATION 2>$null\nif ($region -and $region -notin @(\"eastus2\", \"swedencentral\")) {\n  Write-Host \"\" \n  Write-Host \"===============================================================\" -ForegroundColor Red\n  Write-Host \" REGION NOT SUPPORTED\" -ForegroundColor Red\n  Write-Host \"===============================================================\" -ForegroundColor Red\n  Write-Host \"\"\n  Write-Host \" You selected region: $region\" -ForegroundColor Yellow\n  Write-Host \"\"\n  Write-Host \" gpt-5.4 is currently only available in:\" -ForegroundColor White\n  Write-Host \"   - East US 2      (eastus2)  - GlobalStandard + DataZoneStandard\" -ForegroundColor Cyan\n  Write-Host \"   - Sweden Central (swedencentral) - GlobalStandard only\" -ForegroundColor Cyan\n  Write-Host \"\"\n  Write-Host \" Please change region with: azd env set AZURE_LOCATION eastus2\" -ForegroundColor White\n  Write-Host \"\"\n  exit 1\n}\n\n# ── Deployment SKU Selection ─────────────────────────────────\n$sku = azd env get-value AZURE_OPENAI_DEPLOYMENT_SKU 2>$null\nif (-not $sku) {\n  if ($region -eq \"swedencentral\") {\n    # Sweden Central only supports GlobalStandard — auto-select\n    $sku = \"GlobalStandard\"\n    azd env set AZURE_OPENAI_DEPLOYMENT_SKU $sku\n    Write-Host \"\"\n    Write-Host \"   [OK] Sweden Central detected — Deployment SKU auto-set to: GlobalStandard\" -ForegroundColor Green\n  } else {\n    Write-Host \"\"\n    Write-Host \"===============================================================\" -ForegroundColor Yellow\n    Write-Host \" SELECT GPT-5.4 DEPLOYMENT TYPE\" -ForegroundColor Green\n    Write-Host \"===============================================================\" -ForegroundColor Yellow\n    Write-Host \"\"\n    Write-Host \" 1. GlobalStandard  - No data residency guarantee, available in all supported regions\" -ForegroundColor Cyan\n    Write-Host \" 2. DataZoneStandard - Data stays within geographic zone (US/EU), East US 2 only\" -ForegroundColor Cyan\n    Write-Host \"\"\n    $choice = Read-Host \" Enter choice [1 or 2] (default: 1)\"\n    if ($choice -eq \"2\") {\n      $sku = \"DataZoneStandard\"\n    } else {\n      $sku = \"GlobalStandard\"\n    }\n    azd env set AZURE_OPENAI_DEPLOYMENT_SKU $sku\n    Write-Host \"   [OK] Deployment SKU set to: $sku\" -ForegroundColor Green\n  }\n}\n\nif ($region) {\n  Write-Host \"\"\n  Write-Host \"===============================================================\" -ForegroundColor Yellow\n  Write-Host \" PRE-DEPLOYMENT VERIFICATION\" -ForegroundColor Green\n  Write-Host \"===============================================================\" -ForegroundColor Yellow\n  Write-Host \"\"\n\n  $hasErrors = $false\n\n  # ── 1. Azure CLI Login & Token Validity ──────────────────\n  Write-Host \" [1/7] Checking Azure CLI authentication...\" -ForegroundColor White\n  $ErrorActionPreference = 'SilentlyContinue'\n  $tokenCheck = az account get-access-token --query \"expiresOn\" -o tsv 2>&1\n  $ErrorActionPreference = 'Continue'\n  if ($LASTEXITCODE -ne 0) {\n    Write-Host \"   [!!] Azure CLI token expired or not logged in\" -ForegroundColor Red\n    Write-Host \"   Run: az login\" -ForegroundColor Yellow\n    Write-Host \"\"\n    exit 1\n  }\n  $subId = az account show --query \"id\" -o tsv 2>$null\n  $subName = az account show --query \"name\" -o tsv 2>$null\n  $subState = az account show --query \"state\" -o tsv 2>$null\n  Write-Host \"   [OK] Logged in\" -ForegroundColor Green\n  Write-Host \"   Subscription: $subName\" -ForegroundColor Gray\n  Write-Host \"   Region:       $region\" -ForegroundColor Gray\n\n  # Check subscription state\n  if ($subState -ne \"Enabled\") {\n    Write-Host \"\"\n    Write-Host \"   [!!] Subscription state: $subState\" -ForegroundColor Red\n    Write-Host \"   Your subscription must be in 'Enabled' state to deploy.\" -ForegroundColor Yellow\n    Write-Host \"   Check: https://portal.azure.com/#view/Microsoft_Azure_Billing/SubscriptionsBlade\" -ForegroundColor Gray\n    Write-Host \"\"\n    exit 1\n  }\n\n  # ── 2. Role Assignment Check ─────────────────────────────\n  Write-Host \"\"\n  Write-Host \" [2/7] Checking permissions...\" -ForegroundColor White\n  $ErrorActionPreference = 'SilentlyContinue'\n  $userOid = az ad signed-in-user show --query \"id\" -o tsv 2>$null\n  $ErrorActionPreference = 'Continue'\n  if ($userOid) {\n    $roles = az role assignment list --assignee $userOid --subscription $subId --query \"[].roleDefinitionName\" -o tsv 2>$null\n    if ($roles -match \"Owner|Contributor\") {\n      Write-Host \"   [OK] Sufficient permissions (Contributor or Owner)\" -ForegroundColor Green\n    } else {\n      Write-Host \"   [!!] WARNING: No Contributor/Owner role detected\" -ForegroundColor Yellow\n      Write-Host \"   You may encounter permission errors during deployment.\" -ForegroundColor Yellow\n      Write-Host \"   Required: Contributor + User Access Administrator\" -ForegroundColor Gray\n      $hasErrors = $false  # warning only, don't block\n    }\n  } else {\n    Write-Host \"   [--] Skipped (service principal or managed identity)\" -ForegroundColor Gray\n  }\n\n  # ── 3. Azure CLI Extensions ──────────────────────────────\n  Write-Host \"\"\n  Write-Host \" [3/7] Checking Azure CLI extensions...\" -ForegroundColor White\n  $requiredExts = @(\n    @{ Name = \"containerapp\"; Desc = \"Container Apps\" }\n  )\n  foreach ($ext in $requiredExts) {\n    $ErrorActionPreference = 'SilentlyContinue'\n    $installed = az extension show --name $ext.Name --query \"name\" -o tsv 2>$null\n    $ErrorActionPreference = 'Continue'\n    if ($installed) {\n      Write-Host \"   [OK] $($ext.Desc) ($($ext.Name))\" -ForegroundColor Green\n    } else {\n      Write-Host \"   [..] Installing $($ext.Desc) ($($ext.Name))...\" -ForegroundColor Yellow -NoNewline\n      az extension add --name $ext.Name --yes 2>$null\n      if ($LASTEXITCODE -eq 0) {\n        Write-Host \" OK\" -ForegroundColor Green\n      } else {\n        Write-Host \" FAILED\" -ForegroundColor Red\n        $hasErrors = $true\n      }\n    }\n  }\n\n  # ── 4. Dockerfile Validation ─────────────────────────────\n  Write-Host \"\"\n  Write-Host \" [4/7] Checking project files...\" -ForegroundColor White\n  $missingFiles = @()\n  if (!(Test-Path \"./backend/Dockerfile\"))  { $missingFiles += \"backend/Dockerfile\" }\n  if (!(Test-Path \"./frontend/Dockerfile\"))  { $missingFiles += \"frontend/Dockerfile\" }\n  if (!(Test-Path \"./backend/requirements.txt\")) { $missingFiles += \"backend/requirements.txt\" }\n  if (!(Test-Path \"./frontend/package.json\")) { $missingFiles += \"frontend/package.json\" }\n  if (!(Test-Path \"./infra/main.bicep\"))     { $missingFiles += \"infra/main.bicep\" }\n  if ($missingFiles.Count -eq 0) {\n    Write-Host \"   [OK] All required project files present\" -ForegroundColor Green\n  } else {\n    foreach ($f in $missingFiles) {\n      Write-Host \"   [!!] Missing: $f\" -ForegroundColor Red\n    }\n    Write-Host \"   Ensure you are running azd up from the repository root.\" -ForegroundColor Yellow\n    $hasErrors = $true\n  }\n\n  # ── 5. Soft-Deleted Key Vault Check ──────────────────────\n  Write-Host \"\"\n  Write-Host \" [5/7] Checking for soft-deleted Key Vaults...\" -ForegroundColor White\n  $ErrorActionPreference = 'SilentlyContinue'\n  $envName = azd env get-value AZURE_ENV_NAME 2>$null\n  $deletedVaults = az keyvault list-deleted --query \"[?contains(name, '$envName')].{name:name, location:properties.location}\" -o tsv 2>$null\n  $ErrorActionPreference = 'Continue'\n  if ($deletedVaults) {\n    Write-Host \"   [!!] WARNING: Soft-deleted Key Vault found matching '$envName'\" -ForegroundColor Yellow\n    Write-Host \"   This may cause deployment failures. To fix:\" -ForegroundColor Yellow\n    Write-Host \"   az keyvault purge --name <vault-name>\" -ForegroundColor Gray\n    Write-Host \"   Or use a different environment name: azd env new <new-name>\" -ForegroundColor Gray\n  } else {\n    Write-Host \"   [OK] No conflicting soft-deleted Key Vaults\" -ForegroundColor Green\n  }\n\n  # ── 6. Resource Providers ────────────────────────────────\n  Write-Host \"\"\n  Write-Host \" [6/7] Checking resource providers...\" -ForegroundColor White\n  $providers = @(\n    @{ Name = \"Microsoft.App\";                     Desc = \"Container Apps\" },\n    @{ Name = \"Microsoft.ContainerRegistry\";       Desc = \"Container Registry\" },\n    @{ Name = \"Microsoft.CognitiveServices\";        Desc = \"Microsoft Foundry\" },\n    @{ Name = \"Microsoft.OperationalInsights\";     Desc = \"Log Analytics\" },\n    @{ Name = \"Microsoft.Insights\";                Desc = \"Application Insights\" }\n  )\n\n  $providerIssues = @()\n  foreach ($p in $providers) {\n    $state = az provider show -n $p.Name --query \"registrationState\" -o tsv 2>$null\n    if ($state -eq \"Registered\") {\n      Write-Host \"   [OK] $($p.Desc) ($($p.Name))\" -ForegroundColor Green\n    } else {\n      Write-Host \"   [!!] $($p.Desc) ($($p.Name)) - $state\" -ForegroundColor Red\n      $providerIssues += $p\n    }\n  }\n\n  # Auto-register unregistered providers\n  if ($providerIssues.Count -gt 0) {\n    Write-Host \"\"\n    Write-Host \" Registering missing providers...\" -ForegroundColor Yellow\n    foreach ($p in $providerIssues) {\n      Write-Host \"   Registering $($p.Name)...\" -ForegroundColor White -NoNewline\n      az provider register -n $p.Name --wait 2>$null\n      $state = az provider show -n $p.Name --query \"registrationState\" -o tsv 2>$null\n      if ($state -eq \"Registered\") {\n        Write-Host \" OK\" -ForegroundColor Green\n      } else {\n        Write-Host \" FAILED ($state)\" -ForegroundColor Red\n        Write-Host \"\"\n        Write-Host \" ERROR: Cannot register $($p.Name).\" -ForegroundColor Red\n        Write-Host \" You may need 'Contributor' or 'Owner' role on the subscription.\" -ForegroundColor Yellow\n        Write-Host \"\"\n        exit 1\n      }\n    }\n  }\n\n  # ── 7. Resource Quotas ───────────────────────────────\n  Write-Host \"\"\n  Write-Host \" [7/7] Checking resource quotas...\" -ForegroundColor White\n\n  $ErrorActionPreference = 'SilentlyContinue'\n  $caEnvUsage = az containerapp env list --query \"length([?location=='$region'])\" -o tsv 2>$null\n  $ErrorActionPreference = 'Continue'\n  if ($null -eq $caEnvUsage) { $caEnvUsage = 0 }\n  $caEnvLimit = 15\n  $caEnvRemaining = $caEnvLimit - [int]$caEnvUsage\n\n  # Check Container Registry quota\n  $ErrorActionPreference = 'SilentlyContinue'\n  $acrUsage = az acr list --query \"length([?location=='$region'])\" -o tsv 2>$null\n  $ErrorActionPreference = 'Continue'\n  if ($null -eq $acrUsage) { $acrUsage = 0 }\n\n  # Check Foundry (CognitiveServices) quota\n  $ErrorActionPreference = 'SilentlyContinue'\n  $mlUsage = az cognitiveservices account list --query \"length([?location=='$region'])\" -o tsv 2>$null\n  $ErrorActionPreference = 'Continue'\n  if ($null -eq $mlUsage) { $mlUsage = 0 }\n\n  # Display quota summary\n  $acrLimit = 50\n  $mlLimit = 50\n  Write-Host \"\"\n  Write-Host \" Resource Quota Summary ($region):\" -ForegroundColor Yellow\n  Write-Host \" +--------------------------------+--------+-----------+--------+\" -ForegroundColor Gray\n  Write-Host \" | Resource                       | In Use | Available | Status |\" -ForegroundColor Gray\n  Write-Host \" +--------------------------------+--------+-----------+--------+\" -ForegroundColor Gray\n\n  # Container Apps Environments\n  if ($caEnvRemaining -gt 0) {\n    Write-Host \" | Container Apps Environments    | $($caEnvUsage.ToString().PadLeft(6)) | $($caEnvRemaining.ToString().PadLeft(6))/$caEnvLimit |  \" -ForegroundColor Gray -NoNewline\n    Write-Host \"OK\" -ForegroundColor Green -NoNewline\n    Write-Host \"  |\" -ForegroundColor Gray\n  } else {\n    Write-Host \" | Container Apps Environments    | $($caEnvUsage.ToString().PadLeft(6)) |      0/$caEnvLimit | \" -ForegroundColor Gray -NoNewline\n    Write-Host \"FULL\" -ForegroundColor Red -NoNewline\n    Write-Host \" |\" -ForegroundColor Gray\n  }\n\n  # Container Registries\n  $acrRemaining = $acrLimit - [int]$acrUsage\n  Write-Host \" | Container Registries           | $($acrUsage.ToString().PadLeft(6)) | $($acrRemaining.ToString().PadLeft(6))/$acrLimit |  \" -ForegroundColor Gray -NoNewline\n  Write-Host \"OK\" -ForegroundColor Green -NoNewline\n  Write-Host \"  |\" -ForegroundColor Gray\n\n  # Foundry Resources\n  $mlRemaining = $mlLimit - [int]$mlUsage\n  Write-Host \" | Foundry Resources              | $($mlUsage.ToString().PadLeft(6)) | $($mlRemaining.ToString().PadLeft(6))/$mlLimit |  \" -ForegroundColor Gray -NoNewline\n  Write-Host \"OK\" -ForegroundColor Green -NoNewline\n  Write-Host \"  |\" -ForegroundColor Gray\n\n  Write-Host \" +--------------------------------+--------+-----------+--------+\" -ForegroundColor Gray\n\n  if ($caEnvRemaining -le 0) {\n    Write-Host \"\"\n    Write-Host \" WARNING: Container Apps Environment quota may be exhausted!\" -ForegroundColor Red\n    Write-Host \" You have $caEnvUsage/$caEnvLimit environments in $region.\" -ForegroundColor Yellow\n    Write-Host \" Delete unused environments or request a quota increase.\" -ForegroundColor Yellow\n    Write-Host \" Azure Portal: https://portal.azure.com/#view/Microsoft_Azure_Capacity/QuotaMenuBlade\" -ForegroundColor Gray\n    Write-Host \"\"\n  }\n\n  # Error summary\n  if ($hasErrors) {\n    Write-Host \"\"\n    Write-Host \" [!!] Some checks failed. Deployment may not succeed.\" -ForegroundColor Red\n    Write-Host \" Review warnings above before proceeding.\" -ForegroundColor Yellow\n  } else {\n    Write-Host \"\"\n    Write-Host \" All pre-deployment checks passed!\" -ForegroundColor Green\n  }\n\n  # Resources to be created\n  Write-Host \"\"\n  Write-Host \" Resources to be created:\" -ForegroundColor Yellow\n  Write-Host \"   - Resource Group\" -ForegroundColor White\n  Write-Host \"   - Microsoft Foundry Resource + Project\" -ForegroundColor White\n  Write-Host \"   - Container Registry\" -ForegroundColor White\n  Write-Host \"   - Container Apps Environment\" -ForegroundColor White\n  Write-Host \"   - Backend Container App (Python/FastAPI)\" -ForegroundColor White\n  Write-Host \"   - Agent: Clinical Reviewer (MAF Hosted Agent)\" -ForegroundColor White\n  Write-Host \"   - Agent: Coverage Assessor (MAF Hosted Agent)\" -ForegroundColor White\n  Write-Host \"   - Agent: Compliance Validator (MAF Hosted Agent)\" -ForegroundColor White\n  Write-Host \"   - Agent: Synthesis Decision (MAF Hosted Agent)\" -ForegroundColor White\n  Write-Host \"   - Frontend Container App (Next.js/nginx)\" -ForegroundColor White\n  Write-Host \"   - Log Analytics + Application Insights\" -ForegroundColor White\n  Write-Host \"   - Role Assignments (Cognitive Services OpenAI User + OpenAI Contributor, AcrPull, Azure AI User, Azure AI Project Manager)\" -ForegroundColor White\n  Write-Host \"\"\n  Write-Host \"===============================================================\" -ForegroundColor Yellow\n\n  # Ask for confirmation\n  $confirm = Read-Host \" Proceed with deployment? (Y/n)\"\n  if ($confirm -and $confirm -notmatch \"^(y|yes)$\") {\n    Write-Host \"\"\n    Write-Host \" Deployment cancelled by user.\" -ForegroundColor Yellow\n    Write-Host \"\"\n    exit 1\n  }\n  Write-Host \"\"\n}\n\n# Always provision with placeholder images; postprovision builds real ones\nazd env set IMAGES_BUILT false\n"
            interactive: true
        posix:
            name: preprovision
            kind: sh
            shell: sh
            run: |
                # ── Region Validation ────────────────────────────────────────
                REGION=$(azd env get-value AZURE_LOCATION 2>/dev/null || true)
                if [ -n "$REGION" ] && [ "$REGION" != "eastus2" ] && [ "$REGION" != "swedencentral" ]; then
                  Red='\033[0;31m'
                  Yellow='\033[1;33m'
                  Cyan='\033[0;36m'
                  White='\033[1;37m'
                  NC='\033[0m'
                  printf "\n"
                  printf "${Red}===============================================================\n"
                  printf "${Red} REGION NOT SUPPORTED\n"
                  printf "${Red}===============================================================${NC}\n\n"
                  printf "${Yellow} You selected region: %s${NC}\n\n" "$REGION"
                  printf "${White} gpt-5.4 is currently only available in:${NC}\n"
                  printf "${Cyan}   - East US 2      (eastus2)  - GlobalStandard + DataZoneStandard${NC}\n"
                  printf "${Cyan}   - Sweden Central (swedencentral) - GlobalStandard only${NC}\n\n"
                  printf "${White} Please change region with: azd env set AZURE_LOCATION eastus2${NC}\n\n"
                  exit 1
                fi

                # ── Deployment SKU Selection ─────────────────────────────────
                SKU=$(azd env get-value AZURE_OPENAI_DEPLOYMENT_SKU 2>/dev/null || true)
                if [ -z "$SKU" ]; then
                  Green='\033[0;32m'
                  Yellow='\033[1;33m'
                  Cyan='\033[0;36m'
                  White='\033[1;37m'
                  NC='\033[0m'
                  if [ "$REGION" = "swedencentral" ]; then
                    # Sweden Central only supports GlobalStandard — auto-select
                    SKU="GlobalStandard"
                    azd env set AZURE_OPENAI_DEPLOYMENT_SKU "$SKU"
                    printf "\n${Green}   [OK] Sweden Central detected — Deployment SKU auto-set to: GlobalStandard${NC}\n"
                  else
                    printf "\n"
                    printf "${Yellow}===============================================================\n"
                    printf "${Green} SELECT GPT-5.4 DEPLOYMENT TYPE\n"
                    printf "${Yellow}===============================================================${NC}\n\n"
                    printf "${Cyan} 1. GlobalStandard  - No data residency guarantee, available in all supported regions${NC}\n"
                    printf "${Cyan} 2. DataZoneStandard - Data stays within geographic zone (US/EU), East US 2 only${NC}\n\n"
                    printf "${White} Enter choice [1 or 2] (default: 1): ${NC}"
                    read -r CHOICE
                    if [ "$CHOICE" = "2" ]; then
                      SKU="DataZoneStandard"
                    else
                      SKU="GlobalStandard"
                    fi
                    azd env set AZURE_OPENAI_DEPLOYMENT_SKU "$SKU"
                    printf "${Green}   [OK] Deployment SKU set to: %s${NC}\n" "$SKU"
                  fi
                fi

                # ── Pre-Deployment Verification ────────────────────────────
                if [ -n "$REGION" ]; then
                  Green='\033[0;32m'
                  Yellow='\033[1;33m'
                  Red='\033[0;31m'
                  White='\033[1;37m'
                  Cyan='\033[0;36m'
                  Gray='\033[0;90m'
                  NC='\033[0m'
                  HAS_ERRORS=0

                  printf "\n"
                  printf "${Yellow}===============================================================\n"
                  printf "${Green} PRE-DEPLOYMENT VERIFICATION\n"
                  printf "${Yellow}===============================================================${NC}\n\n"

                  # ── 1. Azure CLI Login & Token Validity ──────────────────
                  printf "${White} [1/7] Checking Azure CLI authentication...${NC}\n"
                  if ! az account get-access-token --query "expiresOn" -o tsv >/dev/null 2>&1; then
                    printf "${Red}   [!!] Azure CLI token expired or not logged in${NC}\n"
                    printf "${Yellow}   Run: az login${NC}\n\n"
                    exit 1
                  fi
                  SUB_ID=$(az account show --query "id" -o tsv 2>/dev/null)
                  SUB_NAME=$(az account show --query "name" -o tsv 2>/dev/null)
                  SUB_STATE=$(az account show --query "state" -o tsv 2>/dev/null)
                  printf "${Green}   [OK] Logged in${NC}\n"
                  printf "${Gray}   Subscription: %s${NC}\n" "$SUB_NAME"
                  printf "${Gray}   Region:       %s${NC}\n" "$REGION"

                  if [ "$SUB_STATE" != "Enabled" ]; then
                    printf "\n${Red}   [!!] Subscription state: %s${NC}\n" "$SUB_STATE"
                    printf "${Yellow}   Your subscription must be in 'Enabled' state to deploy.${NC}\n"
                    printf "${Gray}   Check: https://portal.azure.com/#view/Microsoft_Azure_Billing/SubscriptionsBlade${NC}\n\n"
                    exit 1
                  fi

                  # ── 2. Role Assignment Check ─────────────────────────────
                  printf "\n${White} [2/7] Checking permissions...${NC}\n"
                  USER_OID=$(az ad signed-in-user show --query "id" -o tsv 2>/dev/null || true)
                  if [ -n "$USER_OID" ]; then
                    ROLES=$(az role assignment list --assignee "$USER_OID" --subscription "$SUB_ID" --query "[].roleDefinitionName" -o tsv 2>/dev/null || true)
                    if echo "$ROLES" | grep -qE "Owner|Contributor"; then
                      printf "${Green}   [OK] Sufficient permissions (Contributor or Owner)${NC}\n"
                    else
                      printf "${Yellow}   [!!] WARNING: No Contributor/Owner role detected${NC}\n"
                      printf "${Yellow}   You may encounter permission errors during deployment.${NC}\n"
                      printf "${Gray}   Required: Contributor + User Access Administrator${NC}\n"
                    fi
                  else
                    printf "${Gray}   [--] Skipped (service principal or managed identity)${NC}\n"
                  fi

                  # ── 3. Azure CLI Extensions ──────────────────────────────
                  printf "\n${White} [3/7] Checking Azure CLI extensions...${NC}\n"
                  for EXT_INFO in "containerapp|Container Apps"; do
                    EXT_NAME=$(echo "$EXT_INFO" | cut -d'|' -f1)
                    EXT_DESC=$(echo "$EXT_INFO" | cut -d'|' -f2)
                    if az extension show --name "$EXT_NAME" --query "name" -o tsv >/dev/null 2>&1; then
                      printf "${Green}   [OK] %s (%s)${NC}\n" "$EXT_DESC" "$EXT_NAME"
                    else
                      printf "${Yellow}   [..] Installing %s (%s)...${NC}" "$EXT_DESC" "$EXT_NAME"
                      if az extension add --name "$EXT_NAME" --yes >/dev/null 2>&1; then
                        printf "${Green} OK${NC}\n"
                      else
                        printf "${Yellow} SKIPPED (install requires newer az CLI)${NC}\n"
                      fi
                    fi
                  done

                  # ── 4. Dockerfile Validation ─────────────────────────────
                  printf "\n${White} [4/7] Checking project files...${NC}\n"
                  FILES_OK=1
                  for FILE in "backend/Dockerfile" "frontend/Dockerfile" "backend/requirements.txt" "frontend/package.json" "infra/main.bicep"; do
                    if [ ! -f "./$FILE" ]; then
                      printf "${Red}   [!!] Missing: %s${NC}\n" "$FILE"
                      FILES_OK=0
                      HAS_ERRORS=1
                    fi
                  done
                  if [ "$FILES_OK" = "1" ]; then
                    printf "${Green}   [OK] All required project files present${NC}\n"
                  else
                    printf "${Yellow}   Ensure you are running azd up from the repository root.${NC}\n"
                  fi

                  # ── 5. Soft-Deleted Key Vault Check ──────────────────────
                  printf "\n${White} [5/7] Checking for soft-deleted Key Vaults...${NC}\n"
                  ENV_NAME=$(azd env get-value AZURE_ENV_NAME 2>/dev/null || true)
                  DELETED_VAULTS=$(az keyvault list-deleted --query "[?contains(name, '$ENV_NAME')].name" -o tsv 2>/dev/null || true)
                  if [ -n "$DELETED_VAULTS" ]; then
                    printf "${Yellow}   [!!] WARNING: Soft-deleted Key Vault found matching '%s'${NC}\n" "$ENV_NAME"
                    printf "${Yellow}   This may cause deployment failures. To fix:${NC}\n"
                    printf "${Gray}   az keyvault purge --name <vault-name>${NC}\n"
                    printf "${Gray}   Or use a different environment name: azd env new <new-name>${NC}\n"
                  else
                    printf "${Green}   [OK] No conflicting soft-deleted Key Vaults${NC}\n"
                  fi

                  # ── 6. Resource Providers ────────────────────────────────
                  printf "\n${White} [6/7] Checking resource providers...${NC}\n"
                  PROVIDER_FAILED=0
                  for PROVIDER_INFO in \
                    "Microsoft.App|Container Apps" \
                    "Microsoft.ContainerRegistry|Container Registry" \
                    "Microsoft.CognitiveServices|Microsoft Foundry" \
                    "Microsoft.OperationalInsights|Log Analytics" \
                    "Microsoft.Insights|Application Insights"; do

                    PNAME=$(echo "$PROVIDER_INFO" | cut -d'|' -f1)
                    PDESC=$(echo "$PROVIDER_INFO" | cut -d'|' -f2)
                    STATE=$(az provider show -n "$PNAME" --query "registrationState" -o tsv 2>/dev/null || true)

                    if [ "$STATE" = "Registered" ]; then
                      printf "${Green}   [OK] %s (%s)${NC}\n" "$PDESC" "$PNAME"
                    else
                      printf "${Red}   [!!] %s (%s) - %s${NC}\n" "$PDESC" "$PNAME" "$STATE"
                      printf "${Yellow}   Registering %s...${NC}" "$PNAME"
                      az provider register -n "$PNAME" --wait 2>/dev/null || true
                      STATE=$(az provider show -n "$PNAME" --query "registrationState" -o tsv 2>/dev/null || true)
                      if [ "$STATE" = "Registered" ]; then
                        printf "${Green} OK${NC}\n"
                      else
                        printf "${Red} FAILED (%s)${NC}\n" "$STATE"
                        printf "\n${Red} ERROR: Cannot register %s.${NC}\n" "$PNAME"
                        printf "${Yellow} You may need 'Contributor' or 'Owner' role on the subscription.${NC}\n\n"
                        PROVIDER_FAILED=1
                      fi
                    fi
                  done

                  if [ "$PROVIDER_FAILED" = "1" ]; then
                    exit 1
                  fi

                  # ── 7. Resource Quotas ───────────────────────────────
                  printf "\n${White} [7/7] Checking resource quotas...${NC}\n"

                  # Only check quotas if required CLI extensions are available
                  if az extension show --name containerapp >/dev/null 2>&1; then
                    CA_ENV_USAGE=$(az containerapp env list --query "length([?location=='$REGION'])" -o tsv 2>/dev/null || echo "0")
                  else
                    CA_ENV_USAGE="N/A"
                  fi
                  ACR_USAGE=$(az acr list --query "length([?location=='$REGION'])" -o tsv 2>/dev/null || echo "0")
                  ML_USAGE=$(az cognitiveservices account list --query "length([?location=='$REGION'])" -o tsv 2>/dev/null || echo "0")
                  CA_ENV_LIMIT=15

                  # Display quota summary
                  ACR_LIMIT=50
                  ML_LIMIT=50
                  printf "\n${Yellow} Resource Quota Summary (%s):${NC}\n" "$REGION"
                  printf "${Gray} ┌────────────────────────────────┬────────┬───────────┬────────┐${NC}\n"
                  printf "${Gray} │ Resource                       │ In Use │ Available │ Status │${NC}\n"
                  printf "${Gray} ├────────────────────────────────┼────────┼───────────┼────────┤${NC}\n"

                  if [ "$CA_ENV_USAGE" = "N/A" ]; then
                    printf "${Gray} │ Container Apps Environments    │    N/A │       N/A │${NC} ${Yellow}SKIP${NC} ${Gray}│${NC}\n"
                    CA_REMAINING=1  # assume OK
                  else
                    CA_REMAINING=$((CA_ENV_LIMIT - CA_ENV_USAGE))
                    if [ "$CA_REMAINING" -gt 0 ]; then
                      printf "${Gray} │ Container Apps Environments    │ %6s │ %9s │${NC}  ${Green}OK${NC}  ${Gray}│${NC}\n" "$CA_ENV_USAGE" "$CA_REMAINING/$CA_ENV_LIMIT"
                    else
                      printf "${Gray} │ Container Apps Environments    │ %6s │ %9s │${NC} ${Red}FULL${NC} ${Gray}│${NC}\n" "$CA_ENV_USAGE" "0/$CA_ENV_LIMIT"
                    fi
                  fi
                  if [ "$ACR_USAGE" = "N/A" ]; then
                    printf "${Gray} │ Container Registries           │    N/A │       N/A │${NC} ${Yellow}SKIP${NC} ${Gray}│${NC}\n"
                  else
                    ACR_REMAINING=$((ACR_LIMIT - ACR_USAGE))
                    printf "${Gray} │ Container Registries           │ %6s │ %9s │${NC}  ${Green}OK${NC}  ${Gray}│${NC}\n" "$ACR_USAGE" "$ACR_REMAINING/$ACR_LIMIT"
                  fi
                  if [ "$ML_USAGE" = "N/A" ]; then
                    printf "${Gray} │ Foundry Resources              │    N/A │       N/A │${NC} ${Yellow}SKIP${NC} ${Gray}│${NC}\n"
                  else
                    ML_REMAINING=$((ML_LIMIT - ML_USAGE))
                    printf "${Gray} │ Foundry Resources              │ %6s │ %9s │${NC}  ${Green}OK${NC}  ${Gray}│${NC}\n" "$ML_USAGE" "$ML_REMAINING/$ML_LIMIT"
                  fi
                  printf "${Gray} └────────────────────────────────┴────────┴───────────┴────────┘${NC}\n"

                  if [ "$CA_REMAINING" -le 0 ]; then
                    printf "\n${Red} WARNING: Container Apps Environment quota may be exhausted!${NC}\n"
                    printf "${Yellow} You have %s/%s environments in %s.${NC}\n" "$CA_ENV_USAGE" "$CA_ENV_LIMIT" "$REGION"
                    printf "${Yellow} Delete unused environments or request a quota increase.${NC}\n"
                    printf "${Gray} Azure Portal: https://portal.azure.com/#view/Microsoft_Azure_Capacity/QuotaMenuBlade${NC}\n\n"
                  fi

                  # Error summary
                  if [ "$HAS_ERRORS" = "1" ]; then
                    printf "\n${Red} [!!] Some checks failed. Deployment may not succeed.${NC}\n"
                    printf "${Yellow} Review warnings above before proceeding.${NC}\n"
                  else
                    printf "\n${Green} All pre-deployment checks passed!${NC}\n"
                  fi

                  # Resources to be created
                  printf "\n${Yellow} Resources to be created:${NC}\n"
                  printf "   • Resource Group\n"
                  printf "   • Microsoft Foundry Resource + Project\n"
                  printf "   • Container Registry\n"
                  printf "   • Container Apps Environment\n"
                  printf "   • Backend Container App (Python/FastAPI)\n"
                  printf "   • Agent: Clinical Reviewer (MAF Hosted Agent)\n"
                  printf "   • Agent: Coverage Assessor (MAF Hosted Agent)\n"
                  printf "   • Agent: Compliance Validator (MAF Hosted Agent)\n"
                  printf "   • Agent: Synthesis Decision (MAF Hosted Agent)\n"
                  printf "   • Frontend Container App (Next.js/nginx)\n"
                  printf "   • Log Analytics + Application Insights\n"
                  printf "   • Role Assignments (Cognitive Services OpenAI User + OpenAI Contributor, AcrPull, Azure AI User, Azure AI Project Manager)\n"
                  printf "\n${Yellow}===============================================================${NC}\n"

                  # Ask for confirmation
                  printf " Proceed with deployment? (Y/n) "
                  read -r CONFIRM
                  if [ -n "$CONFIRM" ] && [ "$CONFIRM" != "y" ] && [ "$CONFIRM" != "Y" ] && [ "$CONFIRM" != "yes" ]; then
                    printf "\n${Yellow} Deployment cancelled by user.${NC}\n\n"
                    exit 1
                  fi
                  printf "\n"
                fi

                azd env set IMAGES_BUILT false
            interactive: true
